<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Downloads</title>
  <style>
    /* ══════════════════════════════════════════════════
       GLOBAL & RESET
    ══════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #FFFFFF 0%, #F0F6FF 100%);
      min-height: 100vh;
    }

    /* ══════════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════════ */
    .main {
      margin-left: 240px;
      padding-top: 68px;
      min-height: 100vh;
    }

    .content {
      max-width: 1440px;
      margin: 0 auto;
      padding: 40px 40px 60px;
    }

    /* ─── Content Image ──────────────────────────────────────────── */
    .downloads-content {
      width: 100%;
      display: block;
    }

    /* ══════════════════════════════════════════════════
       RESPONSIVE: Mobile (≤768px)
    ══════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .main { margin-left: 0; padding-top: 56px; padding-bottom: 80px; }
      .content { padding: 16px 16px 40px; }
    }
  </style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════
     SIDEBAR (global component)
═══════════════════════════════════════════════════════ -->
<div id="sidebar-root"></div>

<!-- ═══════════════════════════════════════════════════════
     TOPBAR (global component)
═══════════════════════════════════════════════════════ -->
<div id="topbar-root"></div>

<!-- ═══════════════════════════════════════════════════════
     MAIN CONTENT
═══════════════════════════════════════════════════════ -->
<main class="main">
  <div class="content">
    <img src="images/mt4-icon.png" alt="Downloads" class="downloads-content" />
  </div>
</main>

<!-- ═══════════════════════════════════════════════════════
     LOAD GLOBAL COMPONENTS
═══════════════════════════════════════════════════════ -->
<script src="sidebar.js?v=2.0"></script>
<script src="topbar.js?v=2.0"></script>

</body>
</html>
